version: '3.8'

services:
  # ============ Jaeger (Tracing Dashboard) ============
  # UI: http://localhost:16686
  # OTLP gRPC: localhost:4317
  jaeger:
    image: jaegertracing/all-in-one:1.54
    container_name: eventflow-jaeger
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC receiver
      - "4318:4318"     # OTLP HTTP receiver
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  # ============ Kafka (via KRaft, no Zookeeper) ============
  kafka:
    image: apache/kafka:3.7.0
    container_name: eventflow-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

  # ============ Prometheus (Metrics Scraping) ============
  # UI: http://localhost:9090
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: eventflow-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - kafka

  # ============ Grafana (Metrics Dashboard) ============
  # UI: http://localhost:3000  (admin/admin)
  grafana:
    image: grafana/grafana:10.3.3
    container_name: eventflow-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
